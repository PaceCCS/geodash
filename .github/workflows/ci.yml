name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zig-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Test shapefile
        run: cd core/shapefile && zig build test
      - name: Test network-engine
        run: cd core/network-engine && zig build test
      - name: WASM freshness check
        run: bash scripts/check-wasm-freshness.sh

  zig-fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - name: Check formatting
        run: zig fmt --check core/shapefile/src/ core/network-engine/src/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: cd server && bun install
      - name: Typecheck
        run: cd server && bunx tsc --noEmit
      - name: Lint
        run: cd server && bunx eslint src/

  app-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: cd app && bun install
      - name: Lint
        run: cd app && bunx eslint src/

  bun-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: cd server && bun install
      - name: Run tests
        run: cd server && bun test
      - name: Test count check
        run: bash scripts/check-test-counts.sh

  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: WASM contract check
        run: bash scripts/check-wasm-contract.sh
      - name: Dependency direction check
        run: bash scripts/check-deps.sh
      - name: WASM size check
        run: bash scripts/check-wasm-size.sh
      - name: Docs freshness check
        run: bash scripts/check-docs-freshness.sh
      - name: Test coverage check
        run: bash scripts/check-test-coverage.sh
